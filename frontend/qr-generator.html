<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Generator</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode/1.5.3/qrcode.min.js"></script>

<style>
body { font-family: Arial; padding: 20px; }
.grid { display: flex; flex-wrap: wrap; gap: 20px; }
.card {
  border: 1px solid #ccc;
  padding: 10px;
  width: 150px;
  text-align: center;
  border-radius: 10px;
}
button { margin-top: 10px; }
</style>
</head>

<body>

<h2>QR Generator</h2>

<input id="baseUrl" value="https://cashback-system-cn6k.vercel.app/" style="width:100%; padding:10px; margin-bottom:10px;" />

<br><br>

<button onclick="generate()">Generate QR Codes</button>
<button onclick="downloadCSV()">Download CSV</button>

<br><br>

<div class="grid" id="grid"></div>

<script>
let allCards = [];

function genToken() {
  const chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
  let t = "";
  for (let i=0;i<8;i++) {
    t += chars[Math.floor(Math.random()*chars.length)];
  }
  return t;
}

function generate() {
  const base = document.getElementById("baseUrl").value.trim();
  const grid = document.getElementById("grid");
  grid.innerHTML = "";
  allCards = [];

  for (let i = 0; i < 10; i++) {
    const token = genToken();
    const amount = 5;
    const url = `${base}?amount=${amount}&token=${token}`;

    allCards.push({ token, amount });

    const card = document.createElement("div");
    card.className = "card";

    const canvas = document.createElement("canvas");

    card.innerHTML = `<h3>₹${amount}</h3>`;
    card.appendChild(canvas);

    const text = document.createElement("div");
    text.innerText = token;
    card.appendChild(text);

    const btn = document.createElement("button");
    btn.innerText = "Save PNG";
    btn.onclick = () => {
      const link = document.createElement("a");
      link.href = canvas.toDataURL();
      link.download = `QR-${amount}-${token}.png`;
      link.click();
    };

    card.appendChild(btn);
    grid.appendChild(card);

    // 🔥 QR render (guaranteed working)
    QRCode.toCanvas(canvas, url, { width: 120 }, function (error) {
      if (error) console.error(error);
    });
  }
}

function downloadCSV() {
  let csv = "Token,Amount,Used,ClaimedAt,ClaimedBy\n";
  allCards.forEach(c => {
    csv += `${c.token},${c.amount},FALSE,,\n`;
  });

  const blob = new Blob([csv], { type: "text/csv" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "tokens.csv";
  a.click();
}
</script>

</body>
</html>
