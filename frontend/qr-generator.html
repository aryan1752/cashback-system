<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Batch Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@700;800&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#0c1a10; --ink-2:#3d5445; --ink-3:#7a9484;
  --forest:#1c5c34; --forest-mid:#28834a;
  --forest-light:#e4f5eb; --forest-pale:#f2faf5;
  --gold:#e8960a; --border:#cee5d6; --white:#fff;
  --red:#c0392b; --red-pale:#fdf2f1;
  --r-sm:10px; --r-md:16px; --r-lg:22px;
}
html{-webkit-font-smoothing:antialiased}
body{font-family:'Instrument Sans',sans-serif;background:#f0f7f3;color:var(--ink);padding:32px 16px 60px}

.page-head{text-align:center;margin-bottom:28px}
.page-head h1{font-family:'Bricolage Grotesque',sans-serif;font-size:28px;font-weight:800;color:var(--forest);letter-spacing:-1px;margin-bottom:6px}
.page-head p{font-size:14px;color:var(--ink-3)}

/* Config card */
.cfg-card{max-width:600px;margin:0 auto 24px;background:var(--white);border:1px solid var(--border);border-radius:var(--r-lg);padding:26px 24px}
.cfg-card h2{font-family:'Bricolage Grotesque',sans-serif;font-size:15px;font-weight:700;color:var(--forest);margin-bottom:18px;letter-spacing:0.2px}

.field{margin-bottom:14px}
.field label{display:block;font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:0.7px;color:var(--ink-2);margin-bottom:6px}
.field input{width:100%;padding:11px 13px;border:1.5px solid var(--border);border-radius:var(--r-sm);font-size:14px;font-family:'Instrument Sans',sans-serif;color:var(--ink);background:var(--forest-pale);outline:none;transition:border-color .15s,box-shadow .15s}
.field input:focus{border-color:var(--forest-mid);box-shadow:0 0 0 3px rgba(40,131,74,0.12);background:var(--white)}
.field .hint{font-size:11.5px;color:var(--ink-3);margin-top:4px}

/* Denomination grid */
.denom-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:20px}
.denom-box{border:1.5px solid var(--border);border-radius:var(--r-md);padding:12px 8px;text-align:center;background:var(--forest-pale)}
.denom-val{font-family:'Bricolage Grotesque',sans-serif;font-size:18px;font-weight:700;color:var(--forest);margin-bottom:8px}
.denom-box input{width:100%;padding:7px 4px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;text-align:center;font-family:'Instrument Sans',sans-serif;outline:none;background:var(--white);color:var(--ink)}
.denom-box input:focus{border-color:var(--forest-mid);box-shadow:0 0 0 2px rgba(40,131,74,0.12)}

/* Buttons */
.btn-row{display:flex;gap:10px;flex-wrap:wrap}
.btn-primary{flex:1;min-width:120px;padding:13px 20px;background:var(--forest);color:white;border:none;border-radius:var(--r-sm);font-family:'Bricolage Grotesque',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:background .15s}
.btn-primary:hover{background:#153f25}
.btn-primary:disabled{background:#9bada2;cursor:not-allowed}
.btn-sec{padding:13px 18px;background:var(--white);color:var(--forest);border:1.5px solid var(--border);border-radius:var(--r-sm);font-family:'Instrument Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:background .15s;white-space:nowrap}
.btn-sec:hover{background:var(--forest-pale)}
.btn-sec:disabled{opacity:.45;cursor:not-allowed}

/* Status */
.status{max-width:600px;margin:0 auto 16px;padding:12px 16px;border-radius:var(--r-sm);font-size:13px;display:none}
.status.ok{background:var(--forest-pale);color:var(--forest);border:1px solid var(--border)}
.status.err{background:var(--red-pale);color:var(--red);border:1px solid #f5c6c3}

/* Progress */
.prog-wrap{max-width:600px;margin:0 auto 20px;display:none}
.prog-track{height:5px;background:var(--border);border-radius:99px;overflow:hidden}
.prog-fill{height:100%;background:var(--forest-mid);border-radius:99px;transition:width .2s;width:0}
.prog-lbl{font-size:12px;color:var(--ink-3);margin-top:6px}

/* Summary row */
.summary{max-width:860px;margin:0 auto 20px;display:none;gap:10px;flex-wrap:wrap}
.summary.on{display:flex}
.sum-card{flex:1;min-width:90px;background:var(--white);border:1px solid var(--border);border-radius:var(--r-md);padding:14px 10px;text-align:center}
.sum-denom{font-family:'Bricolage Grotesque',sans-serif;font-size:19px;font-weight:700;color:var(--forest)}
.sum-count{font-size:12px;color:var(--ink-3);margin-top:2px}
.sum-value{font-size:13px;font-weight:600;color:var(--ink-2);margin-top:2px}
.sum-total{border-color:#a5d9b8}

/* QR Output */
.qr-section{max-width:860px;margin:0 auto}
.qr-group{margin-bottom:28px}
.qr-group-title{font-family:'Bricolage Grotesque',sans-serif;font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--ink-3);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.qr-row{display:flex;flex-wrap:wrap;gap:12px}

.qr-card{background:var(--white);border:1px solid var(--border);border-radius:14px;padding:16px 12px 14px;width:148px;text-align:center;flex-shrink:0}
.qc-amount{font-family:'Bricolage Grotesque',sans-serif;font-size:20px;font-weight:800;color:var(--forest);margin-bottom:10px}
.qc-token{font-size:9.5px;font-family:monospace;color:var(--ink-3);margin-top:8px;letter-spacing:1.2px}
.qc-dl{display:inline-block;margin-top:8px;background:var(--forest-pale);color:var(--forest);border:none;border-radius:6px;padding:5px 12px;font-size:11px;font-weight:600;cursor:pointer;text-decoration:none;transition:background .12s}
.qc-dl:hover{background:var(--forest-light)}

@media print{
  .cfg-card,.btn-row,.status,.prog-wrap,.qc-dl,.page-head p{display:none!important}
  body{background:white;padding:8px}
  .qr-card{border:1px solid #ccc;break-inside:avoid}
}
</style>
</head>
<body>

<div class="page-head">
  <h1>QR Batch Generator</h1>
  <p>Generate unique one-time-use QR codes · Export token CSV for Google Sheets</p>
</div>

<div class="cfg-card">
  <h2>Configuration</h2>
  <div class="field">
    <label>Deployed Claim Page URL</label>
    <input type="text" id="baseUrl" value="https://YOUR-SITE.netlify.app/cashback-claim.html">
    <div class="hint">The URL where you deployed cashback-claim.html</div>
  </div>
  <div class="field" style="margin-bottom:20px">
    <label>Cards per denomination</label>
    <div class="denom-grid">
      <div class="denom-box"><div class="denom-val">₹5</div><input type="number" id="q5" value="10" min="0" max="1000"></div>
      <div class="denom-box"><div class="denom-val">₹10</div><input type="number" id="q10" value="10" min="0" max="1000"></div>
      <div class="denom-box"><div class="denom-val">₹25</div><input type="number" id="q25" value="10" min="0" max="1000"></div>
      <div class="denom-box"><div class="denom-val">₹50</div><input type="number" id="q50" value="10" min="0" max="1000"></div>
      <div class="denom-box"><div class="denom-val">₹100</div><input type="number" id="q100" value="10" min="0" max="1000"></div>
    </div>
  </div>
  <div class="btn-row">
    <button class="btn-primary" id="genBtn" onclick="generate()">Generate QR Codes</button>
    <button class="btn-sec" id="csvBtn" onclick="downloadCSV()" disabled>Download CSV for Sheets</button>
    <button class="btn-sec" onclick="window.print()">Print All</button>
  </div>
</div>

<div class="status" id="status"></div>
<div class="prog-wrap" id="progWrap">
  <div class="prog-track"><div class="prog-fill" id="progFill"></div></div>
  <div class="prog-lbl" id="progLbl"></div>
</div>
<div class="summary" id="summary"></div>
<div class="qr-section" id="qrSection"></div>

<script>
const DENOMS = [5,10,25,50,100];
let allCards = [];

function genToken() {
  const chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
  let t = "";
  for (let i=0;i<8;i++) t += chars[Math.floor(Math.random()*chars.length)];
  return t;
}

function setStatus(msg, type) {
  const el = document.getElementById("status");
  el.textContent = msg; el.className = "status " + type; el.style.display = "block";
}
function setProgress(pct, lbl) {
  const wrap = document.getElementById("progWrap");
  wrap.style.display = pct===null ? "none" : "block";
  document.getElementById("progFill").style.width = (pct||0)+"%";
  document.getElementById("progLbl").textContent = lbl||"";
}

async function generate() {
  const base = document.getElementById("baseUrl").value.trim().replace(/\/$/,"");
  if (!base || base.includes("YOUR-SITE")) return setStatus("Enter your deployed claim page URL first.", "err");

  const qty = {
    5:   parseInt(document.getElementById("q5").value)||0,
    10:  parseInt(document.getElementById("q10").value)||0,
    25:  parseInt(document.getElementById("q25").value)||0,
    50:  parseInt(document.getElementById("q50").value)||0,
    100: parseInt(document.getElementById("q100").value)||0,
  };
  const total = Object.values(qty).reduce((a,b)=>a+b,0);
  if (total===0) return setStatus("Enter at least 1 card in any denomination.", "err");

  document.getElementById("genBtn").disabled = true;
  document.getElementById("qrSection").innerHTML = "";
  document.getElementById("summary").className = "summary";
  document.getElementById("status").style.display = "none";
  allCards = [];

  // Build token list
  DENOMS.forEach(d => {
    for (let i=0;i<qty[d];i++) {
      const token = genToken();
      allCards.push({amount:d, token, url:`${base}?amount=${d}&token=${token}`});
    }
  });

  // Render QR codes with progress
  setProgress(0, "Generating QR codes…");
  let done = 0;
  const section = document.getElementById("qrSection");

  for (const denom of DENOMS) {
    const cards = allCards.filter(c=>c.amount===denom);
    if (!cards.length) continue;

    const group = document.createElement("div");
    group.className = "qr-group";
    group.innerHTML = `<div class="qr-group-title">₹${denom} — ${cards.length} cards</div>`;
    const row = document.createElement("div");
    row.className = "qr-row";

    for (const card of cards) {
      const el = document.createElement("div");
      el.className = "qr-card";
      el.innerHTML = `
        <div class="qc-amount">₹${card.amount}</div>
        <canvas id="c-${card.token}"></canvas>
        <div class="qc-token">${card.token}</div>
        <a class="qc-dl" id="dl-${card.token}" href="#" download="QR-${card.amount}-${card.token}.png">⬇ Save PNG</a>
      `;
      row.appendChild(el);

      await new Promise(res => {
        QRCode.toCanvas(document.getElementById(`c-${card.token}`), card.url,
          {width:120, margin:1, color:{dark:"#1c5c34",light:"#ffffff"}},
          err => {
            if (!err) {
              const dl = document.getElementById(`dl-${card.token}`);
              if (dl) dl.href = document.getElementById(`c-${card.token}`).toDataURL("image/png");
            }
            res();
          }
        );
      });

      done++;
      setProgress(Math.round(done/total*100), `Generated ${done} / ${total}…`);
    }
    group.appendChild(row);
    section.appendChild(group);
  }

  setProgress(null);
  renderSummary(qty);
  document.getElementById("genBtn").disabled = false;
  document.getElementById("csvBtn").disabled = false;
  setStatus(`✓ ${total} unique QR codes generated. Download the CSV and paste the Token column into your Google Sheet's Tokens tab.`, "ok");
}

function renderSummary(qty) {
  const row = document.getElementById("summary");
  row.innerHTML = "";
  let grandQty=0, grandVal=0;
  DENOMS.forEach(d => {
    if (!qty[d]) return;
    grandQty += qty[d]; grandVal += qty[d]*d;
    const c = document.createElement("div");
    c.className = "sum-card";
    c.innerHTML = `<div class="sum-denom">₹${d}</div><div class="sum-count">${qty[d]} cards</div><div class="sum-value">₹${(qty[d]*d).toLocaleString("en-IN")}</div>`;
    row.appendChild(c);
  });
  const tot = document.createElement("div");
  tot.className = "sum-card sum-total";
  tot.innerHTML = `<div class="sum-denom" style="color:#0c1a10">Total</div><div class="sum-count">${grandQty} cards</div><div class="sum-value" style="color:var(--forest)">₹${grandVal.toLocaleString("en-IN")}</div>`;
  row.appendChild(tot);
  row.className = "summary on";
}

function downloadCSV() {
  if (!allCards.length) return;
  // CSV formatted exactly for pasting into the Tokens sheet
  // Columns: Token | Amount | Used | ClaimedAt | ClaimedBy
  const rows = [["Token","Amount","Used","ClaimedAt","ClaimedBy"]];
  allCards.forEach(c => rows.push([c.token, c.amount, "FALSE", "", ""]));
  const csv = rows.map(r => r.join(",")).join("\n");
  const blob = new Blob([csv], {type:"text/csv"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = `tokens-${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
}
</script>
</body>
</html>
